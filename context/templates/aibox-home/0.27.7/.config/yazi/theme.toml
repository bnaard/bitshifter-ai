# =============================================================================
# Yazi theme — generated by aibox CLI from the active theme palette
# Docs: https://yazi-rs.github.io/docs/configuration/theme
# =============================================================================

[mgr]
cwd = { fg = "#D79921" }
hovered = { fg = "#282828", bg = "#D5C4A1" }
preview_hovered = { bg = "#3C3836", underline = true }
find_keyword = { fg = "#D79921", bold = true }
find_position = { fg = "#D0521E", italic = true }
marker_selected = { fg = "#98971A", bg = "#98971A" }
marker_copied = { fg = "#D79921", bg = "#D79921" }
marker_cut = { fg = "#CC241D", bg = "#CC241D" }

[tabs]
active = { fg = "#282828", bg = "#D79921", bold = true }
inactive = { fg = "#928374", bg = "#3C3836" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#282828", bg = "#98971A", bold = true }
normal_alt = { fg = "#98971A", bg = "#3C3836", bold = true }
select_main = { fg = "#282828", bg = "#D79921", bold = true }
select_alt = { fg = "#D79921", bg = "#3C3836", bold = true }
unset_main = { fg = "#282828", bg = "#D0521E", bold = true }
unset_alt = { fg = "#D0521E", bg = "#3C3836", bold = true }

[status]
overall = { fg = "#D5C4A1", bg = "#3C3836" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
perm_type = { fg = "#D79921" }
perm_read = { fg = "#D79921" }
perm_write = { fg = "#CC241D" }
perm_exec = { fg = "#98971A" }
perm_sep = { fg = "#928374" }
progress_label = { fg = "#D5C4A1", bold = true }
progress_normal = { fg = "#D79921", bg = "#3C3836" }
progress_error = { fg = "#CC241D", bg = "#3C3836" }

[input]
border = { fg = "#D79921" }
title = { fg = "#D79921", bg = "#282828", bold = true }
value = { fg = "#D5C4A1", bg = "#282828" }
selected = { reversed = true }

[pick]
border = { fg = "#D79921" }
active = { fg = "#D0521E" }
inactive = { fg = "#928374", bg = "#282828" }

[cmp]
border = { fg = "#D79921" }
active = { fg = "#D0521E" }
inactive = { fg = "#928374", bg = "#282828" }

[tasks]
border = { fg = "#D79921" }
title = { fg = "#D79921", bg = "#282828", bold = true }
hovered = { bg = "#3C3836", underline = true }

[which]
mask = { bg = "#3C3836" }
cand = { fg = "#689D6A" }
rest = { fg = "#928374" }
desc = { fg = "#D0521E" }
separator = "  "
separator_style = { fg = "#928374" }

[help]
on = { fg = "#689D6A" }
run = { fg = "#D0521E" }
desc = { fg = "#D5C4A1", bg = "#282828" }
hovered = { bg = "#3C3836", bold = true }
footer = { fg = "#282828", bg = "#D5C4A1" }

[git]
modified = { fg = "#D79921" }
untracked = { fg = "#D0521E" }
added = { fg = "#98971A" }
deleted = { fg = "#CC241D" }
updated = { fg = "#D79921" }
ignored = { fg = "#928374" }

[filetype]
rules = [
    { url = "*/", fg = "#D79921", bold = true },
    { url = "*.rs", fg = "#D65D0E" },
    { url = "*.py", fg = "#D79921" },
    { url = "*.js", fg = "#D79921" },
    { url = "*.ts", fg = "#D79921" },
    { url = "*.sh", fg = "#98971A" },
    { url = "*.toml", fg = "#689D6A" },
    { url = "*.yaml", fg = "#689D6A" },
    { url = "*.yml", fg = "#689D6A" },
    { url = "*.json", fg = "#689D6A" },
    { url = "*.kdl", fg = "#689D6A" },
    { url = "*.html", fg = "#D65D0E" },
    { url = "*.css", fg = "#D79921" },
    { url = "*.md", fg = "#D5C4A1" },
    { url = "*.tex", fg = "#98971A" },
    { url = "*.typ", fg = "#98971A" },
    { url = "*.pdf", fg = "#CC241D" },
    { url = "*.png", fg = "#D0521E" },
    { url = "*.jpg", fg = "#D0521E" },
    { url = "*.jpeg", fg = "#D0521E" },
    { url = "*.gif", fg = "#D0521E" },
    { url = "*.svg", fg = "#D0521E" },
    { url = "*.zip", fg = "#D65D0E" },
    { url = "*.tar*", fg = "#D65D0E" },
    { url = "*.gz", fg = "#D65D0E" },
    { url = "*.gitignore", fg = "#928374" },
    { url = ".env*", fg = "#CC241D" },
    { url = "Dockerfile*", fg = "#D79921" },
    { url = "Makefile", fg = "#98971A" },
    { url = "Cargo.toml", fg = "#D65D0E", bold = true },
    { url = "Cargo.lock", fg = "#928374" },
]
