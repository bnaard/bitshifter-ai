# Generated by aibox — do not edit manually.
# To modify, edit aibox.toml and run: aibox apply
#
# =============================================================================
# HOW TO CUSTOMIZE:
#   Do NOT edit this file directly — it is regenerated by `aibox apply`.
#   To add ports/volumes/env vars: use docker-compose.override.yml
#   To change user:     set user in aibox.toml [container], run `aibox apply`
#
# VOLUME MOUNT STRATEGY:
#   Config files (vim, tmux, yazi, git, AI tools) are mounted read-write from
#   the host-side .aibox-home/ directory so changes persist across rebuilds.
#   The workspace (project root) is mounted at /workspace inside the container.
#   SSH keys are mounted read-only for security.
# =============================================================================
#
name: bitshifter-ai

services:
  bitshifter-ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: bitshifter-ai-devcontainer:latest
    container_name: bitshifter-ai
    hostname: bitshifter-ai
    init: true
    # Codex CLI uses bubblewrap for Linux sandboxing. Some container
    # runtime seccomp profiles block unprivileged user namespace creation
    # before bubblewrap can set up its own sandbox. This narrow fallback
    # avoids privileged=true and SYS_ADMIN.
    security_opt:
      - seccomp=unconfined
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      # Workspace (project root)
      - ${WORKSPACE_DIR:-..}:/workspace:rw
      # SSH keys
      - ../.aibox-home/.ssh:/home/aibox/.ssh:ro
      # Vim config and undo history
      - ../.aibox-home/.vim:/home/aibox/.vim:rw
      # XDG config home
      - ../.aibox-home/.config:/home/aibox/.config:rw
      # XDG cache home
      - ../.aibox-home/.cache:/home/aibox/.cache:rw
      # readline key bindings
      - ../.aibox-home/.inputrc:/home/aibox/.inputrc:rw
      # XDG local data, state, and helper scripts
      - ../.aibox-home/.local:/home/aibox/.local:rw
      # tmux plugin and socket state
      - ../.aibox-home/.tmux:/home/aibox/.tmux:rw
      # AI harness config and login state
      - ../.aibox-home/.codex:/home/aibox/.codex:rw
    env_file:
      # Credentials from .aibox-local.toml — gitignored, never committed.
      # Re-generated by `aibox apply`; may be empty when no local overlay exists.
      - ../.aibox-local.env
    environment:
      COLORTERM: "truecolor"
      GIT_CONFIG_GLOBAL: "/home/aibox/.config/git/config"
      LANG: "en_US.UTF-8"
      SHELL: "/bin/bash"
      TERM: "xterm-256color"
      TZ: "Europe/Berlin"
    command: sleep infinity

  bitshifter-ai-latex-preview:
    image: bitshifter-ai-devcontainer:latest
    container_name: bitshifter-ai-latex-preview
    hostname: bitshifter-ai-latex-preview
    user: aibox
    entrypoint: []
    init: true
    working_dir: /workspace
    read_only: true
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.25
    restart: "on-failure:3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      # The preview can read generated PDFs but cannot mutate the project.
      - ${WORKSPACE_DIR:-..}:/workspace:ro
    ports:
      # Host exposure is explicit and defaults to loopback only.
      - "127.0.0.1:8766:8765"
    environment:
      AIBOX_LATEX_DOCUMENTS_JSON: "[{\"name\":\"overview\",\"pdf\":\"/workspace/doc/overview/out/overview.pdf\",\"source\":\"doc/overview/overview.tex\"},{\"name\":\"theory\",\"pdf\":\"/workspace/doc/theory/out/book.pdf\",\"source\":\"doc/theory/book.tex\"}]"
      AIBOX_LATEX_PREFERRED_DOCUMENT: "overview"
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/health"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 2s
    command:
      - /usr/local/bin/aibox-latex-preview
      - --bind
      - 0.0.0.0
      - --port
      - "8765"

  bitshifter-ai-diagnostics:
    image: bitshifter-ai-devcontainer:latest
    container_name: bitshifter-ai-diagnostics
    hostname: bitshifter-ai-diagnostics
    user: root
    init: true
    pid: "service:bitshifter-ai"
    depends_on:
      - bitshifter-ai
    working_dir: /workspace
    pids_limit: 64
    mem_limit: 64m
    cpus: 0.20
    restart: "on-failure:3"
    volumes:
      # Diagnostics only writes bounded runtime snapshots and event logs.
      # Do not mount the whole workspace here; it makes sidecar disk usage
      # look like a second copy of the project and gives the sidecar a wider
      # write surface than it needs.
      - ${WORKSPACE_DIR:-..}/.aibox:/workspace/.aibox:rw
    command:
      - /usr/local/bin/aibox-diagnostics
      - --watch
      - --output
      - /workspace/.aibox/diagnostics