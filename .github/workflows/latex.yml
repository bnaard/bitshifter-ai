name: Build LaTeX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX with latex-action
        uses: xu-cheng/latex-action@v2
        with:
          root_file: doc/article/article.tex

      - name: Upload built PDF(s)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: article-pdf
          path: doc/article/*.pdf
